<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos 3.1 — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #CC0000 0%, #aa0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .logo { font-size: 48px; margin-bottom: 12px; }
        h1 { font-size: 24px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
        .tagline { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        #google_signin_button { margin: 20px 0; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; font-size: 13px; margin-top: 20px; display: none; }
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #999; }
        .version { margin-top: 20px; font-size: 11px; color: #ddd; text-align: right; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">📋</div>
    <h1>Documentos 3.1</h1>
    <p class="tagline">Generador de Documentos Legales Inmobiliarios</p>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div id="google_signin_button"></div>
    
    <div id="error-message" class="error-message"></div>
    
    <div class="footer">
        <p>✅ Autenticación segura con Google</p>
        <p>✅ Tus datos están protegidos</p>
    </div>
    <div class="version">v3.1 — 2024</div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    window.onload = function () {
        if (isAuthenticated()) { window.location.href = 'dashboard.html'; return; }
        google.accounts.id.initialize({
            client_id: CONFIG.GOOGLE_CLIENT_ID,
            callback: handleGoogleLogin
        });
        google.accounts.id.renderButton(document.getElementById('google_signin_button'), { theme: 'outline', size: 'large', text: 'signin_with' });
    };
</script>
</body>
</html>
