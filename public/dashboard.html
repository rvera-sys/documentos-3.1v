<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Documentos — Documentos 3.1</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container { padding: 24px 20px; max-width: 1200px; margin: 0 auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .documents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .doc-card { background: white; border: 1.5px solid #ddd; border-radius: 8px; padding: 18px; cursor: pointer; transition: all 0.2s; }
        .doc-card:hover { border-color: #CC0000; box-shadow: 0 4px 12px rgba(204,0,0,0.1); transform: translateY(-2px); }
        .doc-card h3 { font-size: 14px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
        .doc-card .template-name { font-size: 12px; color: #666; margin-bottom: 10px; }
        .version-badge { display: inline-block; background: #f0fdf4; color: #065f46; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
        .doc-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn-small { flex: 1; padding: 6px 8px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s; }
        .btn-edit { color: #1e40af; border-color: #bfdbfe; }
        .btn-edit:hover { background: #eff6ff; }
        .btn-delete { color: #991b1b; border-color: #fecaca; }
        .btn-delete:hover { background: #fee2e2; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .btn-primary { padding: 10px 16px; background: #CC0000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .btn-primary:hover { background: #aa0000; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="header">
    <div class="header-logo">📋 DOCUMENTOS</div>
    <div class="header-user">
        <div><div id="user-name" style="font-weight: 600; font-size: 13px;">Usuario</div><small id="user-company" style="color: #666;">RE/MAX CREA</small></div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<div class="dashboard-container">
    <div class="header-section">
        <h1>📝 Mis Documentos</h1>
        <button class="btn-primary" onclick="createNewDocument()">➕ Crear Nuevo Documento</button>
    </div>
    
    <div id="documents-list" class="documents-grid"><!-- Se llena dinámicamente --></div>
    <div id="empty-state" class="empty-state" style="display: none;">
        <div class="empty-icon">📄</div>
        <p>No hay documentos aún</p>
        <button class="btn-primary" onclick="createNewDocument()" style="margin-top: 20px;">Crear el primero</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
    if (!isAuthenticated()) window.location.href = 'index.html';
    
    const user = JSON.parse(localStorage.getItem('auth_user') || '{}');
    document.getElementById('user-name').textContent = user.full_name || 'Usuario';
    document.getElementById('user-company').textContent = user.company_name || 'RE/MAX CREA';
    
    let allDocuments = [];
    
    async function loadDocuments() {
        try {
            allDocuments = await api.listDocuments();
            renderDocuments();
        } catch (e) {
            console.error('Error:', e);
        }
    }
    
    function renderDocuments() {
        const list = document.getElementById('documents-list');
        const empty = document.getElementById('empty-state');
        
        if (!allDocuments || allDocuments.length === 0) {
            list.style.display = 'none';
            empty.style.display = 'block';
            return;
        }
        
        empty.style.display = 'none';
        list.innerHTML = allDocuments.map(doc => `
            <div class="doc-card">
                <h3>${doc.title}</h3>
                <div class="template-name">${doc.template_name || doc.template_id}</div>
                <span class="version-badge">v${doc.version}</span>
                <div style="font-size: 11px; color: #999;">${new Date(doc.updated_at).toLocaleDateString('es-AR')}</div>
                <div class="doc-actions">
                    <button class="btn-small btn-edit" onclick="editDocument('${doc.id}')">✏️ Editar</button>
                    <button class="btn-small btn-delete" onclick="deleteDocument('${doc.id}')">🗑️ Eliminar</button>
                </div>
            </div>
        `).join('');
    }
    
    function editDocument(id) { window.location.href = `editor.html?id=${id}`; }
    function createNewDocument() { window.location.href = 'editor.html?new=true'; }
    
    function deleteDocument(id) {
        if (confirm('¿Eliminar este documento?')) {
            const token = getToken();
            fetch(`${API_BASE_URL}/api/documents/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(() => {
                showToast('✅ Documento eliminado');
                loadDocuments();
            });
        }
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
    
    function getToken() { return localStorage.getItem('auth_token'); }
    
    loadDocuments();
</script>
</body>
</html>
